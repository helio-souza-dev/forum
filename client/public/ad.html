<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sponsored Ad</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #080808;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .ad-wrapper {
      width: 100%;
      height: 100%;
      max-height: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    /* Força redimensionamento responsivo para widgets e banners da ExoClick */
    .ad-wrapper ins,
    .ad-wrapper iframe,
    .ad-wrapper table,
    .ad-wrapper div[id^="exoclick"] {
      max-width: 100% !important;
      max-height: 280px !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      margin: 0 auto !important;
    }
  </style>
</head>
<body>
  <div class="ad-wrapper" id="ad-container">
    <script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script>
    <ins class="eas6a97888e20" id="exoclick-ins"></ins>
    <script>
      (function() {
        try {
          var urlParams = new URLSearchParams(window.location.search);
          var zoneId = urlParams.get('zone') || '5975042';
          var ins = document.getElementById('exoclick-ins');
          if (ins && zoneId) {
            ins.setAttribute('data-zoneid', zoneId);
            (window.AdProvider = window.AdProvider || []).push({"serve": {}});
          }
        } catch (e) {
          console.error('Ad load error:', e);
        }
      })();
    </script>
  </div>
</body>
</html>
